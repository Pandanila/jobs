<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>JOBS — рекрутинг через видео</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --surface-2: #1A1A1A;
    --accent: #BFFF00;
    --text: #FFFFFF;
    --muted: #888888;
    --border: #1E1E1E;
    --red: #FF3B30;
    --phone-radius: 46px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background:
      radial-gradient(1100px 700px at 18% -10%, rgba(191,255,0,0.10), transparent 60%),
      radial-gradient(900px 600px at 110% 110%, rgba(191,255,0,0.05), transparent 55%),
      #050505;
    font-family: 'Manrope', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  #root { height: 100%; }

  /* ---- App stage: centers the phone on the pitch backdrop ---- */
  .stage {
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 6vw, 90px);
    padding: 20px;
  }

  .stage-copy {
    display: none;
    max-width: 360px;
    color: var(--text);
  }
  @media (min-width: 920px) {
    .stage-copy { display: block; }
  }
  .stage-copy .wordmark {
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 56px;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0 0 22px;
  }
  .stage-copy .wordmark b { color: var(--accent); }
  .stage-copy p {
    font-size: 17px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 0 16px;
  }
  .stage-copy .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    border: 1px solid rgba(191,255,0,0.3);
    border-radius: 999px;
    padding: 7px 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---- The phone ---- */
  .phone {
    position: relative;
    width: 420px;
    height: min(900px, calc(100dvh - 40px));
    max-width: calc(100vw - 24px);
    background: var(--bg);
    border-radius: var(--phone-radius);
    border: 1px solid #242424;
    box-shadow:
      0 0 0 11px #0c0c0c,
      0 0 0 12px #2a2a2a,
      0 50px 120px -20px rgba(0,0,0,0.9),
      0 0 90px -30px rgba(191,255,0,0.25);
    overflow: hidden;
    flex-shrink: 0;
  }

  /* notch */
  .phone::before {
    content: '';
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 128px;
    height: 30px;
    background: #000;
    border-radius: 999px;
    z-index: 999;
    pointer-events: none;
  }

  .screen {
    position: absolute;
    inset: 0;
    border-radius: var(--phone-radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* content area (above the tab bar) */
  .content {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }

  /* status bar */
  .statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    font-size: 14px;
    font-weight: 700;
    z-index: 50;
    pointer-events: none;
  }
  .statusbar .dots { display: flex; gap: 5px; align-items: center; }
  .statusbar .bars { display: flex; gap: 3px; align-items: flex-end; height: 12px; }
  .statusbar .bars i { width: 3px; background: currentColor; border-radius: 1px; display: block; }

  /* scrollbars hidden everywhere inside the phone */
  .phone *::-webkit-scrollbar { display: none; }
  .phone * { scrollbar-width: none; }

  /* shared text helpers */
  .u { font-family: 'Unbounded', sans-serif; }
  .accent { color: var(--accent); }
  .muted { color: var(--muted); }

  /* generic button reset */
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* fade/slide screen transition */
  @keyframes screenIn {
    from { transform: translateY(12px); }
    to   { transform: translateY(0); }
  }
  .anim-in { animation: screenIn 240ms ease; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .anim-up { animation: slideUp 280ms cubic-bezier(.2,.8,.2,1); }

  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(191,255,0,0.55), 0 6px 20px -6px rgba(191,255,0,0.5); }
    50%     { box-shadow: 0 0 0 12px rgba(191,255,0,0), 0 6px 26px -4px rgba(191,255,0,0.7); }
  }
  .glow { animation: pulseGlow 1.8s ease-in-out infinite; }

  @keyframes spinIn {
    from { transform: scale(0.4); }
    to   { transform: scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</html>
